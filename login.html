<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login — Mapa do Viajante PRO • CRM Copilot para Agências de Viagem">
  <title>Login — Mapa do Viajante PRO</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Tokens + Login Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/login.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo">
          <div class="login-logo-icon">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <div class="login-logo-text">Mapa<span>PRO</span></div>
        </div>
        <p class="login-subtitle">CRM Copilot para Agências de Viagem</p>
      </div>

      <!-- Feedback Message -->
      <div class="login-error" id="login-error">
        <i class="fas fa-exclamation-triangle" id="login-error-icon"></i>
        <span id="login-error-text">E-mail ou senha inválidos</span>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">

        <div class="login-field">
          <label for="login-email">E-mail</label>
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required>
        </div>

        <div class="login-field">
          <label for="login-password">Senha</label>
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div style="text-align: right; margin-top: -8px;">
          <a href="#" onclick="showForgotPassword(event)" class="login-forgot-link">Esqueci minha senha</a>
        </div>

        <button type="submit" class="login-submit" id="login-submit">
          Entrar no sistema
          <i class="fas fa-arrow-right"></i>
        </button>

        <div class="login-divider"><span>ou</span></div>

        <button type="button" class="login-google-btn" id="google-btn" onclick="handleGoogleLogin()">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Entrar com Google
        </button>

      </form>

      <!-- Link para cadastro -->
      <div style="text-align: center; margin-top: 12px;">
        <span style="color: rgba(255,255,255,0.4); font-size: 13px;">Não tem conta?</span>
        <a href="#" onclick="showSignUpForm(event)" class="login-forgot-link" style="font-size: 13px; margin-left: 4px;">Criar conta gratuita</a>
      </div>

      <!-- Forgot Password Panel -->
      <div class="login-form" id="forgot-form" style="display:none;">
        <p style="color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 4px;">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        <div class="login-field">
          <label for="reset-email">E-mail</label>
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="reset-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <button type="button" class="login-submit" id="reset-submit" onclick="handleForgotPassword()">
          Enviar link de recuperação
          <i class="fas fa-paper-plane"></i>
        </button>
        <div style="text-align: center; margin-top: 4px;">
          <a href="#" onclick="showLoginForm(event)" class="login-forgot-link">Voltar ao login</a>
        </div>
      </div>

      <!-- Sign Up Panel -->
      <div class="login-form" id="signup-form" style="display:none;">
        <p style="color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 4px;">Crie sua conta e comece a usar o CRM PRO agora.</p>
        <div class="login-field">
          <label for="signup-name">Seu nome</label>
          <i class="fas fa-user field-icon"></i>
          <input type="text" id="signup-name" placeholder="Nome completo" autocomplete="name" required>
        </div>
        <div class="login-field">
          <label for="signup-email">E-mail</label>
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="login-field">
          <label for="signup-password">Senha</label>
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">
        </div>
        <button type="button" class="login-submit" id="signup-submit" onclick="handleSignUp()">
          Criar minha conta
          <i class="fas fa-rocket"></i>
        </button>
        <div style="text-align: center; margin-top: 8px;">
          <a href="#" onclick="showLoginForm(event)" class="login-forgot-link">Já tenho conta — Entrar</a>
        </div>
      </div>

    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ── Callback OAuth & session check ──────────────────────
    (async function() {
      // Se já tem sessão local, redireciona
      const localSession = getSession();
      if (localSession) { window.location.href = 'index.html'; return; }

      // Verifica se há sessão Supabase ativa (retorno de OAuth Google)
      const oauthUser = await handleOAuthSession();
      if (oauthUser) { window.location.href = 'index.html'; }
    })();

    // ── Helpers de UI ────────────────────────────────────────
    function showFeedback(message, type = 'error') {
      const el = document.getElementById('login-error');
      const text = document.getElementById('login-error-text');
      const icon = document.getElementById('login-error-icon');
      text.textContent = message;
      if (type === 'success') {
        el.style.background = 'rgba(16,185,129,0.12)';
        el.style.borderColor = 'rgba(16,185,129,0.2)';
        el.style.color = '#34D399';
        icon.className = 'fas fa-check-circle';
      } else {
        el.style.background = 'rgba(238,95,82,0.12)';
        el.style.borderColor = 'rgba(238,95,82,0.2)';
        el.style.color = '#FF7B73';
        icon.className = 'fas fa-exclamation-triangle';
      }
      el.classList.add('visible');
    }

    function hideFeedback() {
      document.getElementById('login-error').classList.remove('visible');
    }

    function showForgotPassword(e) {
      if (e) e.preventDefault();
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'flex';
      hideFeedback();
    }

    function showLoginForm(e) {
      if (e) e.preventDefault();
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'flex';
      hideFeedback();
    }

    function showSignUpForm(e) {
      if (e) e.preventDefault();
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('signup-form').style.display = 'flex';
      hideFeedback();
    }

    // ── Login com e-mail/senha ────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-submit');
      hideFeedback();

      if (!email || !password) {
        showFeedback('Preencha todos os campos');
        return;
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
      btn.disabled = true;

      const result = await authenticate(email, password);

      if (result.success) {
        btn.innerHTML = '<i class="fas fa-check"></i> Entrando...';
        setTimeout(() => { window.location.href = 'index.html'; }, 400);
      } else {
        btn.innerHTML = 'Entrar no sistema <i class="fas fa-arrow-right"></i>';
        btn.disabled = false;
        showFeedback(result.error);
        btn.style.animation = 'shakeError 0.4s ease';
        setTimeout(() => btn.style.animation = '', 400);
      }
    }

    // ── Login com Google ──────────────────────────────────────
    async function handleGoogleLogin() {
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirecionando...';
      hideFeedback();

      const result = await signInWithGoogle();
      if (!result.success) {
        btn.disabled = false;
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Entrar com Google';
        showFeedback(result.error);
      }
      // Se success, o Supabase redireciona automaticamente para o Google
    }

    // ── Recuperação de senha ──────────────────────────────────
    async function handleForgotPassword() {
      const email = document.getElementById('reset-email').value.trim();
      const btn = document.getElementById('reset-submit');
      hideFeedback();

      if (!email) {
        showFeedback('Informe seu e-mail para continuar');
        return;
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
      btn.disabled = true;

      const result = await sendPasswordReset(email);

      btn.innerHTML = 'Enviar link de recuperação <i class="fas fa-paper-plane"></i>';
      btn.disabled = false;

      if (result.success) {
        showFeedback('Link enviado! Verifique sua caixa de entrada.', 'success');
      } else {
        showFeedback(result.error);
      }
    }

    // ── Cadastro (Sign Up) ────────────────────────────────────
    async function handleSignUp() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn = document.getElementById('signup-submit');
      hideFeedback();

      if (!name || !email || !password) {
        showFeedback('Preencha todos os campos');
        return;
      }
      if (password.length < 6) {
        showFeedback('A senha deve ter pelo menos 6 caracteres');
        return;
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando conta...';
      btn.disabled = true;

      const result = await signUpUser(name, email, password);

      if (result.success) {
        if (result.needsConfirmation) {
          // Email confirmation required
          btn.innerHTML = '<i class="fas fa-check"></i> Conta criada!';
          showFeedback('Conta criada! Verifique seu e-mail para confirmar o cadastro.', 'success');
          btn.disabled = false;
          setTimeout(() => showLoginForm(), 4000);
        } else {
          // Sign up successful — create session and redirect
          const member = result.member;
          const sessionUser = {
            id: result.user.id,
            name: member.name,
            email: email,
            role: member.role,
            avatar: member.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase(),
            memberId: member.id,
            agencyId: member.agency_id,
            isSupabase: true,
          };
          setSession(sessionUser);
          btn.innerHTML = '<i class="fas fa-check"></i> Conta criada!';
          showFeedback('Conta criada com sucesso! Redirecionando...', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }
      } else {
        btn.innerHTML = 'Criar minha conta <i class="fas fa-rocket"></i>';
        btn.disabled = false;
        showFeedback(result.error);
        btn.style.animation = 'shakeError 0.4s ease';
        setTimeout(() => btn.style.animation = '', 400);
      }
    }
  </script>

</body>
</html>

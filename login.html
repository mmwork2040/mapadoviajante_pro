<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login — Mapa do Viajante PRO • CRM Copilot para Agências de Viagem">
  <title>Login — Mapa do Viajante PRO</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Tokens + Login Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/login.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo">
          <div class="login-logo-icon">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <div class="login-logo-text">Mapa<span>PRO</span></div>
        </div>
        <p class="login-subtitle">CRM Copilot para Agências de Viagem</p>
      </div>

      <!-- Error Message -->
      <div class="login-error" id="login-error">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="login-error-text">E-mail ou senha inválidos</span>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">

        <div class="login-field">
          <label for="login-email">E-mail</label>
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required>
        </div>

        <div class="login-field">
          <label for="login-password">Senha</label>
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

<button type="submit" class="login-submit" id="login-submit">
          Entrar no sistema
          <i class="fas fa-arrow-right"></i>
        </button>


      </form>

    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check if already logged in
    (function() {
      const session = getSession();
      if (session) {
        window.location.href = 'index.html';
        return;
      }
    })();

    // Handle Login (async for Supabase auth)
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const errorText = document.getElementById('login-error-text');
      const btn = document.getElementById('login-submit');

      // Hide previous error
      errorEl.classList.remove('visible');

      if (!email || !password) {
        errorText.textContent = 'Preencha todos os campos';
        errorEl.classList.add('visible');
        return;
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
      btn.disabled = true;

      const result = await authenticate(email, password);

      if (result.success) {
        btn.innerHTML = '<i class="fas fa-check"></i> Entrando...';
        setTimeout(() => { window.location.href = 'index.html'; }, 400);
      } else {
        btn.innerHTML = 'Entrar no sistema <i class="fas fa-arrow-right"></i>';
        btn.disabled = false;
        errorText.textContent = result.error;
        errorEl.classList.add('visible');
        btn.style.animation = 'shakeError 0.4s ease';
        setTimeout(() => btn.style.animation = '', 400);
      }
    }
  </script>

</body>
</html>

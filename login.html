<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login — Mapa do Viajante PRO • CRM Copilot para Agências de Viagem">
  <title>Login — Mapa do Viajante PRO</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Tokens + Login Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/login.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-logo">
          <div class="login-logo-icon">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <div class="login-logo-text">Mapa<span>PRO</span></div>
        </div>
        <p class="login-subtitle">CRM Copilot para Agências de Viagem</p>
      </div>

      <!-- Error Message -->
      <div class="login-error" id="login-error">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="login-error-text">E-mail ou senha inválidos</span>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">

        <div class="login-field" id="name-field" style="display: none;">
          <label for="login-name">Nome Completo</label>
          <i class="fas fa-user field-icon"></i>
          <input type="text" id="login-name" placeholder="Seu nome completo" autocomplete="name">
        </div>

        <div class="login-field">
          <label for="login-email">E-mail</label>
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required>
        </div>

        <div class="login-field">
          <label for="login-password">Senha</label>
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <!-- Role Selector (Demo) -->
        <div class="login-role-selector">
          <label>Perfil de acesso</label>
          <div class="role-options">
            <label class="role-option">
              <input type="radio" name="role" value="admin" checked>
              <div class="role-card">
                <div class="role-icon"><i class="fas fa-shield-halved"></i></div>
                <span class="role-name">Admin</span>
              </div>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="gerente">
              <div class="role-card">
                <div class="role-icon"><i class="fas fa-briefcase"></i></div>
                <span class="role-name">Gerente</span>
              </div>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="consultor">
              <div class="role-card">
                <div class="role-icon"><i class="fas fa-headset"></i></div>
                <span class="role-name">Consultor</span>
              </div>
            </label>
          </div>
        </div>

        <button type="submit" class="login-submit" id="login-submit">
          Entrar no sistema
          <i class="fas fa-arrow-right"></i>
        </button>

        <div class="login-toggle" style="text-align: center; margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.45);">
          <span id="toggle-message">Não tem uma conta?</span>
          <a href="#" id="toggle-mode-btn" onclick="toggleAuthMode(event)" style="color: var(--orange-400); font-weight: 600; text-decoration: none; margin-left: 4px;">Cadastre-se</a>
        </div>

      </form>

      <!-- Demo Credentials (hidden by default) -->
      <div class="login-footer" id="demo-footer" style="display: none;">
        <p style="margin-bottom: 8px; color: rgba(255,255,255,0.35); font-size: 11px;">ACESSO DEMO (OFFLINE)</p>
        <p>Admin: <a href="#" onclick="fillDemo('admin')">admin@mapapro.com</a></p>
        <p>Gerente: <a href="#" onclick="fillDemo('gerente')">gerente@mapapro.com</a></p>
        <p>Consultor: <a href="#" onclick="fillDemo('consultor')">consultor@mapapro.com</a></p>
      </div>
      <div style="text-align: center; margin-top: 12px;">
        <a href="#" onclick="event.preventDefault(); const df=document.getElementById('demo-footer'); df.style.display = df.style.display === 'none' ? 'block' : 'none';" style="color: rgba(255,255,255,0.25); font-size: 10px; text-decoration: none;">Modo Demo (offline)</a>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check if already logged in
    (function() {
      const session = getSession();
      if (session) {
        window.location.href = 'index.html';
        return;
      }
    })();

    // Demo credentials (only used when explicitly clicking demo links)
    const roleCredentials = {
      admin:     { email: 'admin@mapapro.com',     password: 'admin123' },
      gerente:   { email: 'gerente@mapapro.com',   password: 'gerente123' },
      consultor: { email: 'consultor@mapapro.com', password: 'consultor123' },
    };

    // Fields start empty — user must type real credentials
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';

    // Fill demo credentials
    function fillDemo(role) {
      event.preventDefault();
      const creds = roleCredentials[role];
      document.getElementById('login-email').value = creds.email;
      document.getElementById('login-password').value = creds.password;
      // Select the matching radio
      const radio = document.querySelector(`input[name="role"][value="${role}"]`);
      if (radio) radio.checked = true;
    }

    let authMode = 'login'; // 'login' or 'register'

    function toggleAuthMode(e) {
      if (e) e.preventDefault();
      const nameField = document.getElementById('name-field');
      const submitBtn = document.getElementById('login-submit');
      const toggleMsg = document.getElementById('toggle-message');
      const toggleBtn = document.getElementById('toggle-mode-btn');
      const errorEl = document.getElementById('login-error');
      const demoFooter = document.getElementById('demo-footer');
      
      errorEl.classList.remove('visible');

      // Clear fields when switching modes
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
      
      if (authMode === 'login') {
        authMode = 'register';
        nameField.style.display = 'block';
        document.getElementById('login-name').value = '';
        document.getElementById('login-name').required = true;
        submitBtn.innerHTML = 'Criar minha conta <i class="fas fa-user-plus"></i>';
        toggleMsg.textContent = 'Já tem uma conta?';
        toggleBtn.textContent = 'Entre';
        if (demoFooter) demoFooter.style.display = 'none';
      } else {
        authMode = 'login';
        nameField.style.display = 'none';
        document.getElementById('login-name').required = false;
        submitBtn.innerHTML = 'Entrar no sistema <i class="fas fa-arrow-right"></i>';
        toggleMsg.textContent = 'Não tem uma conta?';
        toggleBtn.textContent = 'Cadastre-se';
      }
    }

    // Handle Login and Register
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const errorText = document.getElementById('login-error-text');
      const btn = document.getElementById('login-submit');

      // Hide previous error
      errorEl.classList.remove('visible');

      if (authMode === 'register') {
        const name = document.getElementById('login-name').value.trim();
        if (!name || !email || !password) {
          errorText.textContent = 'Preencha todos os campos';
          errorEl.classList.add('visible');
          return;
        }

        const role = document.querySelector('input[name="role"]:checked').value;

        // Show loading
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Criando conta...';
        btn.disabled = true;

        const result = await registerUser(name, email, password, role);

        if (result.success) {
          if (result.sessionActive) {
            btn.innerHTML = '<i class="fas fa-check"></i> Conta criada!';
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 600);
          } else {
            btn.innerHTML = '<i class="fas fa-envelope"></i> Confirmar e-mail';
            errorText.innerHTML = `<i class="fas fa-info-circle"></i> ${result.message}`;
            errorEl.style.backgroundColor = 'rgba(16, 185, 129, 0.12)';
            errorEl.style.borderColor = 'rgba(16, 185, 129, 0.2)';
            errorEl.style.color = '#10B981';
            errorEl.classList.add('visible');
          }
        } else {
          btn.innerHTML = 'Criar minha conta <i class="fas fa-user-plus"></i>';
          btn.disabled = false;
          errorText.textContent = result.error;
          errorEl.style.backgroundColor = 'rgba(238,95,82,0.12)';
          errorEl.style.borderColor = 'rgba(238,95,82,0.2)';
          errorEl.style.color = '#FF7B73';
          errorEl.classList.add('visible');
          btn.style.animation = 'shakeError 0.4s ease';
          setTimeout(() => btn.style.animation = '', 400);
        }
      } else {
        if (!email || !password) {
          errorText.textContent = 'Preencha todos os campos';
          errorEl.classList.add('visible');
          return;
        }

        // Show loading
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
        btn.disabled = true;

        const result = await authenticate(email, password);

        if (result.success) {
          btn.innerHTML = '<i class="fas fa-check"></i> Entrando...';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 400);
        } else {
          btn.innerHTML = 'Entrar no sistema <i class="fas fa-arrow-right"></i>';
          btn.disabled = false;
          errorText.textContent = result.error;
          errorEl.style.backgroundColor = 'rgba(238,95,82,0.12)';
          errorEl.style.borderColor = 'rgba(238,95,82,0.2)';
          errorEl.style.color = '#FF7B73';
          errorEl.classList.add('visible');
          btn.style.animation = 'shakeError 0.4s ease';
          setTimeout(() => btn.style.animation = '', 400);
        }
      }
    }
  </script>

</body>
</html>
